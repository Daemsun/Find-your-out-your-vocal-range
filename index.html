<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Out Your Vocal Range</title>
    
    <meta property="og:title" content="Find Out Your Vocal Range" />
    <meta property="og:description" content="Take this test to find your vocal range, from lowest note to highest note, and compare with others!" />
    <meta property="og:image" content="https://yoursite.com/placeholder_image.jpg" />
    <meta property="og:url" content="https://daemsun.github.io/Find-your-out-your-vocal-range/" />
    <meta property="og:type" content="website" />

    <style>
        :root {
            --bg-color: #f5f6f8;       
            --card-bg: #ffffff;        
            --text: #333333;           
            --text-muted: #666666;     
            
            --bass: #19bca3;           
            --tenor: #7d5bb2;          
            --alto: #f3b03c;           
            --soprano: #65c3df;        
            --c4-red: #e24a4a;         
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #222222;
            margin-bottom: 30px;
            text-transform: capitalize;
            font-weight: 800;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e1e4e8;
            margin-bottom: 30px;
        }

        .selectors {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 25px;
        }

        .select-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        select {
            background: #ffffff;
            color: #333333;
            border: 2px solid #ced4da;
            padding: 12px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: border-color 0.3s;
            font-weight: 600;
        }

        select:focus {
            outline: none;
            border-color: var(--tenor);
        }

        .btn {
            background: linear-gradient(45deg, var(--tenor), var(--bass));
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(125, 91, 178, 0.3);
            box-sizing: border-box;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(25, 188, 163, 0.4);
        }
